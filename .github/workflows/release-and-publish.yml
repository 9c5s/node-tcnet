name: Release & Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # リリース中のキャンセルはpublish不整合を招くため禁止

jobs:
  release-and-publish:
    name: Release & Publish
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: write # changesets-actionによるブランチ作成・コミット・タグpushに必要
      pull-requests: write # Version Packages PR作成に必要
      id-token: write # npm provenanceに必要
      packages: write # GitHub Packages publishに必要
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        # zizmor: ignore[artipacked] changesets-actionがgit pushするためcredentialsの永続化が必要
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.jsセットアップ
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24.x
          cache: 'npm'

      - name: 依存パッケージのインストール
        run: npm ci

      - name: ビルド
        run: npm run build

      - name: Changesetワークフロー実行
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          publish: npm run changeset publish
          createGithubReleases: true

      - name: GitHub Packages用 Node.jsセットアップ
        if: steps.changesets.outputs.published == 'true'
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com

      - name: GitHub Packagesにpublish
        if: steps.changesets.outputs.published == 'true'
        run: npm publish --registry https://npm.pkg.github.com --provenance=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
