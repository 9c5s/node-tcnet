name: Release & Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - 'package.json'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # リリース中のキャンセルはpublish不整合を招くため禁止

jobs:
  release-and-publish:
    name: Release & Publish
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: write # changesets-actionによるブランチ作成・コミット・タグpushに必要
      pull-requests: write # Version Packages PR作成に必要
      id-token: write # npm provenanceに必要
      packages: write # GitHub Packages publishに必要
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # zizmor: ignore[artipacked] changesets-actionがgit pushするためcredentialsの永続化が必要
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.x
          cache: 'npm'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Changesets
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          publish: npm run changeset publish
          createGithubReleases: true

      - name: Setup Node.js for GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        run: npm publish --registry https://npm.pkg.github.com --provenance=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
