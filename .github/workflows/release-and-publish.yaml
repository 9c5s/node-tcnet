name: Release & Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: release-${{ github.ref }}

jobs:
  release-and-publish:
    name: Release & Publish
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: write # changesets-actionによるブランチ作成・コミット・タグpushに必要
      pull-requests: write # Version Packages PR作成に必要
      id-token: write # npm provenanceに必要
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        # zizmor: ignore[artipacked] changesets-actionがgit pushするためcredentialsの永続化が必要
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Use Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm install --frozen-lockfile
      - run: npm run build
      - name: Run Changeset Workflow
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          publish: npm run changeset publish
          createGithubReleases: true
