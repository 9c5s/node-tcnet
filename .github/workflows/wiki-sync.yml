name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["docs/wiki/**"]

permissions: {}

concurrency:
  group: wiki-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Wikiリポジトリへのpushに必要
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: GitHub Wikiへ同期
        uses: Andrew-Chen-Wang/github-wiki-action@50650fccf3a10f741995523cf9708c53cec8912a # v4
        with:
          path: docs/wiki
          token: ${{ secrets.GITHUB_TOKEN }}
