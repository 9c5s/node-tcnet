colors: false
no_tty: true

pre-commit:
  parallel: true
  jobs:
    - name: protect-branch
      run: >
        d=$(git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null|sed 's#^origin/##')&&
        [ $(git symbolic-ref --short HEAD) = $d ]&&
        echo Direct commits to $d are not allowed. Use a feature branch.&&
        exit 1;true

    - name: ignored-files
      run: "! git check-ignore {staged_files}"

    - name: lefthook
      glob: lefthook.yml
      run: npx lefthook validate

    - name: actionlint
      glob: '.github/workflows/*.{yml,yaml}'
      run: npx actionlint {staged_files}

    - name: zizmor
      glob: '.github/workflows/*.{yml,yaml}'
      run: bunx zizmor --fix --pedantic {staged_files}
      stage_fixed: true

    - name: format
      glob: "*.{ts,json,html,css}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

    - name: lint
      glob: "*.ts"
      exclude: '\.d\.ts$'
      run: npx eslint --fix {staged_files}
      stage_fixed: true

    - name: typecheck
      run: npx tsc --noEmit

    - name: build
      run: npm run build

commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}
