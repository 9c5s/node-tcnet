colors: false
no_tty: true
glob_matcher: doublestar

pre-commit:
  parallel: true
  jobs:
    # ガードチェック
    - name: protect-branch
      run: >
        d=$(git symbolic-ref --quiet --short
        refs/remotes/origin/HEAD 2>/dev/null|sed 's#^origin/##');
        d=${d:-main};
        [ $(git rev-parse --abbrev-ref HEAD) != $d ] ||
        { echo Direct commits to $d are not allowed.&& exit 1; }

    - name: ignored-files
      run: "! git check-ignore {staged_files}"

    # TypeScript (format → lint は逐次実行)
    - name: code-style
      group:
        piped: true
        jobs:
          - name: format
            glob: "**/*.{ts,js,mjs,json,jsonc}"
            run: npx prettier --write {staged_files}
            stage_fixed: true
          - name: lint
            glob: "**/*.ts"
            exclude: '\.d\.ts$'
            run: npx eslint {staged_files}

    - name: typecheck
      glob: "{**/*.ts,tsconfig.json}"
      run: npm run typecheck

    - name: test
      glob: "**/*.ts"
      exclude: '\.d\.ts$'
      run: npm run test

    - name: build
      glob: "{**/*.ts,tsconfig.json}"
      run: npm run build

    # Markdown
    - name: markdownlint
      glob: "**/*.{md,MD}"
      exclude: 'CHANGELOG\.md'
      run: npx markdownlint-cli2 {staged_files}

    - name: textlint
      glob: "{docs/wiki/**/*.md,README.MD}"
      run: npx textlint {staged_files}

    # GitHub Actions (zizmor --fix → actionlint は逐次実行)
    - name: ci-lint
      group:
        piped: true
        jobs:
          - name: zizmor
            glob: '.github/{workflows/*.{yml,yaml},dependabot.yml}'
            run: bunx zizmor --fix --pedantic {staged_files}
            stage_fixed: true
          - name: actionlint
            glob: '.github/workflows/*.{yml,yaml}'
            run: bunx actionlint {staged_files}

    # 設定ファイル
    - name: lefthook
      glob: lefthook.yml
      run: bunx lefthook validate

    - name: changeset-validate
      glob: ".changeset/*.md"
      exclude: 'README\.md'
      run: npx tsx scripts/validate-changeset.ts {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}
