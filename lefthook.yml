colors: false
no_tty: true

pre-commit:
  parallel: true
  jobs:
    - name: protect-branch
      run: >
        d=$(git symbolic-ref --quiet --short
        refs/remotes/origin/HEAD 2>/dev/null|sed 's#^origin/##');
        d=${d:-main};
        [ $(git rev-parse --abbrev-ref HEAD) != $d ] ||
        { echo Direct commits to $d are not allowed.&& exit 1; }

    - name: ignored-files
      run: "! git check-ignore {staged_files}"

    - name: lefthook
      glob: lefthook.yml
      run: bunx lefthook validate

    - name: actionlint
      glob: '.github/workflows/*.{yml,yaml}'
      run: bunx actionlint {staged_files}

    - name: zizmor
      glob: '.github/workflows/*.{yml,yaml}'
      run: bunx zizmor --fix --pedantic {staged_files}
      stage_fixed: true

    - name: format
      glob: "**/*.{ts,json,html,css}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

    - name: lint
      glob: "**/*.ts"
      exclude: '\.d\.ts$'
      run: npx eslint {staged_files}

    - name: typecheck
      run: npx tsc --noEmit

    - name: build
      run: npm run build

    - name: mdlint
      glob: "**/*.{md,MD}"
      exclude: 'node_modules|CHANGELOG\.md'
      run: npx markdownlint-cli2 {staged_files}

    - name: textlint
      glob: "docs/wiki/**/*.md"
      run: npx textlint {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}
